<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini Jira - Kanban Board</title>

    <link rel="stylesheet"
          href="kanban.css">

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>Mini Jira</h2>

        <ul>

            <li>
                <a href="../dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="../project/project.html">
                    Projects
                </a>
            </li>

            <li>
                <a href="../task/task.html">
                    Tasks
                </a>
            </li>

            <li class="active">
                Kanban Board
            </li>

            <li>
    <a href="../calendar/calendar.html">
        Calendar
    </a>
</li> 

            <li>
                <a href="../report/report.html">
                    Reports
                </a>
            </li>

            <li>
                <a href="../profile/profile.html">
                    Profile
                </a>
            </li>

            <li>

                <button
                class="logout-btn"
                onclick="logout()">

                    Logout

                </button>

            </li>

        </ul>

    </div>

    <div class="main">

        <h1>Kanban Board</h1>

        <div class="board">

            <div class="column">

                <h2>📋 Open</h2>

                <div id="openTasks"></div>

            </div>

            <div class="column">

                <h2>⚡ In Progress</h2>

                <div id="progressTasks"></div>

            </div>

            <div class="column">

                <h2>✅ Completed</h2>

                <div id="completedTasks"></div>

            </div>

        </div>

    </div>

</div>

<script src="kanban.js"></script>
<script src="../logout.js"></script>

</body>
</html>
