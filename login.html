<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini Jira Login</title>

    <link rel="stylesheet"
          href="login.css">
</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>Mini Jira</h1>

        <p>
            Sign in to continue to your account
        </p>

    </div>

    <div class="right-panel">

        <div class="login-box">

            <h2>Login</h2>

            <p class="subtitle">
                Enter your credentials
            </p>

            <form id="loginForm">

                <input
                    type="email"
                    id="email"
                    placeholder="Email"
                    required
                >

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required
                >

                <div class="forgot">
                    <a href="forgot-password.html">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit">
                    Login
                </button>

            </form>

            <p class="register">
                Don't have an account?

                <a href="register.html">
                    Register
                </a>
            </p>

            <div id="message"></div>

        </div>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
