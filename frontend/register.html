<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jira - Register</title>

    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

    <!-- Left Side -->

    <div class="left">

        <img
        src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        alt="User">

        <h2>Welcome To Mini Jira 🚀</h2>

        <p>
            Create your account and start managing
            projects and tasks efficiently.
        </p>

    </div>

    <!-- Right Side -->

    <div class="right">

        <h1>Register</h1>

        <p class="subtitle">
            Create your Mini Jira account
        </p>

        <div class="input-group">
            <input
            type="text"
            id="name"
            placeholder="Enter Full Name">
        </div>

        <div class="input-group">
            <input
            type="email"
            id="email"
            placeholder="Enter Email">
        </div>

        <div class="input-group">
            <input
            type="password"
            id="password"
            placeholder="Enter Password">
        </div>

        <button
        class="register-btn"
        onclick="registerUser()">
            Register
        </button>

        <p id="message"></p>

        <div class="login-link">

            Already have an account?

            <a href="login.html">
                Login
            </a>

        </div>

    </div>

</div>

<script src="register.js"></script>

</body>
</html>
