<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini Jira - Calendar</title>
    <link rel="stylesheet" href="calendar.css">
</head>

<body>

<div class="dashboard">

    <div class="sidebar">
        <h2>🚀 Mini Jira</h2>

        <a href="../dashboard.html">🏠 Dashboard</a>
        <a href="../project/project.html">📁 Projects</a>
        <a href="../task/task.html">✅ Tasks</a>
        <a href="../kanban/kanban.html">📋 Kanban Board</a>
        <a class="active">🗓 Calendar</a>
        <a href="../report/report.html">📊 Reports</a>
        <a href="../profile/profile.html">👤 Profile</a>

        <button class="logout-btn" onclick="logout()">↪ Logout</button>
    </div>

    <div class="main">

       <div class="topbar">

    <div>
        <h1>Calendar</h1>
        <p>View tasks by due dates and schedule.</p>
    </div>



</div>


        <div class="calendar-card">

            <div class="calendar-header">
                <button onclick="previousMonth()">◀</button>
                <h2 id="monthYear">Month Year</h2>
                <button onclick="nextMonth()">▶</button>
            </div>

            <div class="weekdays">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>

        </div>

    </div>

</div>

<script src="calendar.js"></script>
<script src="../logout.js"></script>

</body>
</html>
