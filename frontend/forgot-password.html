<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini Jira - Forgot Password</title>

    <link rel="stylesheet"
          href="forgot-password.css">
</head>

<body>

<div class="container">

    <div class="card">

        <h1> Mini Jira 🚀</h1>

        <h2>Reset Password</h2>

        <p>
            Update your account password
        </p>

        <input
        type="email"
        id="email"
        placeholder="Enter Email">

        <input
        type="password"
        id="newPassword"
        placeholder="New Password">

        <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

        <button onclick="updatePassword()">
            Update Password
        </button>

        <p id="message"></p>

        <a href="login.html">
            Back To Login
        </a>

    </div>

</div>

<script src="forgot-password.js"></script>

</body>
</html>
