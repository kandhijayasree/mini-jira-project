<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini Jira - Tasks</title>

    <link rel="stylesheet"
          href="task.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Mini Jira</h2>

        <ul>

            <li>
                <a href="../dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="../project/project.html">
                    Projects
                </a>
            </li>

             <li class="active">
                Tasks

            </li>

            <li>
        <a href="../kanban/kanban.html">
            Kanban Board
        </a>
    </li>
<li>
    <li>
    <a href="../calendar/calendar.html">
        Calendar
    </a>
</li>
        <a href="../report/report.html">
            Reports
        </a>
    </li>

    <li>
        <a href="../profile/profile.html">
            Profile
        </a>
    </li>
            <li>
                <button
                class="logout-btn"
                onclick="logout()">

                    Logout

                </button>
            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <h1>Task Management</h1>

        <div class="task-form">
 <input
            type="hidden"
            id="taskId">

            <label>Project</label>
<select id="projectId">
    <option value="">Select Project</option>
</select>


            <input
            type="text"
            id="taskName"
            placeholder="Task Name">

            <input
            type="text"
            id="description"
            placeholder="Description">

            <input
            type="text"
            id="assignedTo"
            placeholder="Assigned To">

            <input
            type="date"
            id="dueDate">

            <select id="priority">

                <option value="Low">
                    Low
                </option>

                <option value="Medium">
                    Medium
                </option>

                <option value="High">
                    High
                </option>

            </select>



            <select id="status">

                <option value="Open">
                    Open
                </option>

                <option value="In Progress">
                    In Progress
                </option>

                <option value="Completed">
                    Completed
                </option>

                <option value="Overdue">
                    Overdue
                </option>

            </select>

            <button
            onclick="saveTask()">

                Save Task

            </button>

        </div>
        <div class="search-box">

    <input
    type="text"
    id="searchTask"
    placeholder="Search Task..."
    onkeyup="searchTask()">

</div>

        <table>

            <thead>

                <tr>

                    <th>Task</th>
                    <th>Description</th>
                    <th>Assigned To</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="taskTable">

            </tbody>

        </table>

    </div>

</div>

<script src="task.js"></script>
<script src="../logout.js"></script>

</body>
</html>
