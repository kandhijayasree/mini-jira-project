<!DOCTYPE html>
<html>

<head>

    <title>Mini Jira Projects</title>

    <link rel="stylesheet"
    href="project.css">

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>Mini Jira</h2>

        <ul>
            


            <li>
                <a href="../dashboard.html">
                    Dashboard
                </a>
            </li>

            <li class="active">
                Projects
            </li>
            <li>
                <a href="../task/task.html">
                    Tasks
                </a>
            </li>

            <li>
    <a href="../kanban/kanban.html">
        Kanban Board
    </a>
</li>

            <li>
                <a href="../calendar/calendar.html">
                    Calendar
                </a>
            </li>

        <li>
        <a href="../report/report.html">
            Reports
        </a>
    </li>

    <li>
        <a href="../profile/profile.html">
            Profile
        </a>
    </li>

    <li>
        <button
        class="logout-btn"
        onclick="logout()">
            Logout
        </button>
    </li>

        </ul>

    </div>

    <div class="main">

        <div class="header">

            <h1>Projects</h1>

        </div>

        <div class="project-form">

              <input
              type="hidden"
              id="projectId">


             <input
             type="text"
              id="projectName"
             placeholder="Project Name">

            <input
            type="text"
            id="description"
            placeholder="Description">

            <input
            type="date"
            id="startDate">

            <input
            type="date"
            id="endDate">

            <select id="status">

                <option>
                    Active
                </option>
                <option value="Archived">
    Archived
</option>

                <option>
                    Planning
                </option>

                <option>
                    Completed
                </option>

            </select>

            <button

             onclick="saveProject()">

                save Project

            </button>

        </div>
       <select id="projectFilter" onchange="loadProjects()">
    <option value="All" selected>All Projects</option>
    <option value="Active">Active Projects</option>
    <option value="Archived">Archived Projects</option>
</select>
<div class="search-box">

    <input
    type="text"
    id="searchProject"
    placeholder="Search Project..."
    onkeyup="searchProject()">

</div>

        <table>

            <thead>

                <tr>
    <th>Name</th>
    <th>Description</th>
    <th>Start</th>
    <th>End</th>
    <th>Status</th>
    <th>Tasks</th>
    <th>Action</th>
</tr>

            </thead>

            <tbody id="projectTable">

            </tbody>

        </table>

    </div>

</div>

<script src="project.js"></script>
<script src="../logout.js"></script>

</body>

</html>
