<!DOCTYPE html>
<html>

<head>

    <title>Mini Jira Reports</title>

    <link rel="stylesheet"
          href="report.css">

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>Mini Jira</h2>

        <ul>

            <li>
                <a href="../dashboard.html">
                    Dashboard
                </a>
            </li>

            <li>
                <a href="../project/project.html">
                    Projects
                </a>
            </li>

            <li>
                <a href="../task/task.html">
                    Tasks
                </a>
            </li>

            <li>
                <a href="../kanban/kanban.html">
                    Kanban Board
                </a>
            </li>
<li>
                <a href="../calendar/calendar.html">
                    Calendar
                </a>
            </li>
            
            <li class="active">
            Reports
            
            </li>
<li>
                <a href="../profile/profile.html">
                    Profile
                </a>
            </li>
            <li>
                <button
                class="logout-btn"
                onclick="logout()">

                    Logout

                </button>
            </li>

        </ul>

    </div>

    <div class="main">

        <h1>Reports Dashboard</h1>

        <div class="cards">

            <div class="card">
                <h2 id="totalProjects">0</h2>
                <p>Total Projects</p>
            </div>

            <div class="card">
                <h2 id="totalTasks">0</h2>
                <p>Total Tasks</p>
            </div>

            <div class="card">
                <h2 id="openTasks">0</h2>
                <p>Open Tasks</p>
            </div>

            <div class="card">
                <h2 id="completedTasks">0</h2>
                <p>Completed Tasks</p>
            </div>

        </div>

        <div class="progress-box">

            <h3>Completion Rate</h3>

            <div class="progress-bar">

                <div id="progressFill"
                     class="progress-fill">

                </div>

            </div>

            <p id="progressText">
                0%
            </p>

        </div>

    </div>

</div>

<script src="report.js"></script>
<script src="../logout.js"></script>

</body>
</html>
