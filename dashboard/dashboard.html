<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mini Jira Dashboard</title>

    <link rel="stylesheet"
          href="dashboard.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>Mini Jira</h2>

        <ul>

            <li class="active">
                Dashboard
            </li>

            <li>
                <a href="/mini-jira/project/project.html">
                    Projects
                </a>
            </li>

            <li>
                <a href="/mini-jira/task/task.html">
                    Tasks
                </a>
            </li>

            <li>
                <a href="/mini-jira/kanban/kanban.html">
                    Kanban Board
                </a>
            </li>

            <li>
                <a href="/mini-jira/calendar/calendar.html">
                    Calendar
                </a>
            </li>

            <li>
                <a href="/mini-jira/report/report.html">
                    Reports
                </a>
            </li>

            <li>
                <a href="/mini-jira/profile/profile.html">
                    Profile
                </a>
            </li>

            <li>
                <button
                class="logout-btn"
                onclick="logout()">
                    Logout
                </button>
            </li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main">

        <h1>Dashboard</h1>

        <h3 id="welcome">
            Welcome, User
        </h3>

        <!-- Dashboard Cards -->

       <div class="cards">

    <div class="card">
        <h2 id="totalProjects">0</h2>
        <p>Total Projects</p>
    </div>

    <div class="card">
        <h2 id="totalTasks">0</h2>
        <p>Total Tasks</p>
    </div>

    <div class="card">
        <h2 id="openTasks">0</h2>
        <p>Open Tasks</p>
    </div>

    <div class="card">
        <h2 id="progressTasks">0</h2>
        <p>In Progress Tasks</p>
    </div>

    <div class="card">
        <h2 id="completedTasks">0</h2>
        <p>Completed Tasks</p>
    </div>

    <div class="card">
        <h2 id="overdueTasks">0</h2>
        <p>Overdue Tasks</p>
    </div>

</div>

        <!-- Chart -->

        <div class="chart-container">

            <canvas id="taskChart">

            </canvas>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="dashboard.js"></script>

<script src="logout.js"></script>

</body>
</html>
